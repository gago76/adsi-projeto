services:
  - type: web
    name: adsi-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # preencher manualmente com a connection string do Supabase
      - key: FRONTEND_URL
        sync: false   # preencher após o deploy do frontend

services:
  - type: web
    name: adsi-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false   # preencher com a URL do backend no Render
      - key: VITE_WHATSAPP_NUMBER
        sync: false
      - key: VITE_WHATSAPP_MESSAGE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
